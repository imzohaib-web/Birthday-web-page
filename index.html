<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Zohaib</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Happy+Monkey&family=Orbitron:wght@400..900&display=swap"
        rel="stylesheet">
</head>

<body>
    <div id="header">
        <p id="small-title">A special little page for a special day</p>
        <h1>Today is Zohaib's birthday&#127881;</h1>
        <img id="image" src="dp.jpg" alt="Zohaib smiling">
        <h3 id="bd-age">21 years old</h3>
        <p id="bd-date">22.10.2025</p>
    </div>

    <div class="gift-section">

        <h2 class="gift-title">Here is how happy I am for you today</h2>
        <h3 class="gift-hint">(Hover over the gift)</h3>
        <div class="gift-img" id="gift-img-happy"></div>

        <h2 class="gift-title">How people react when you enter the room&#128525;</h2>
        <div class="gift-img" id="gift-img-react"></div>

        <h2 class="gift-title">If I had to describe you in one word</h2>
        <div class="gift-img" id="gift-img-genius"></div>

        <h2 class="gift-title">The only person as cool as you</h2>
        <div class="gift-img" id="gift-img-bad"></div>
    </div>
</body>

</html>
